name: Problema no aplicativo
description: Relate um erro de interface, navegação, progresso ou cronômetro.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: O que aconteceu?
      description: Descreva o problema e o resultado esperado.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Como reproduzir
      placeholder: |
        1. Abra...
        2. Clique em...
        3. Observe...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Navegador
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - Outro
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Sistema e dispositivo
      placeholder: "Ex.: Windows 11, notebook"
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmação
      options:
        - label: Verifiquei que o relato não contém dados pessoais, tokens ou informações sensíveis.
          required: true
